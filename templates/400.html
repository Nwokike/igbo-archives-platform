{% extends 'base.html' %}
{% load static %}

{% block title %}400 Bad Request - Igbo Archives{% endblock %}

{% block content %}
<div class="text-center py-16 max-w-lg mx-auto">
    <div class="text-8xl font-bold text-accent mb-4">400</div>
    <h1 class="font-serif text-2xl font-semibold mb-4">Bad Request</h1>
    <p class="text-text-muted mb-8">
        The request you sent was invalid. Please try again.
    </p>
    <div class="flex gap-4 justify-center">
        <a href="{% url 'core:home' %}" class="btn-primary">
            <i class="fas fa-home"></i> Go Home
        </a>
        <a href="javascript:history.back()" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Go Back
        </a>
    </div>
</div>
{% endblock %}
