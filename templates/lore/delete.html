{% extends 'base.html' %}

{% block title %}Delete Lore - Igbo Archives{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <div class="card p-8 text-center border-red-500/20">
        <div
            class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-6 text-red-600 text-2xl">
            <i class="fas fa-exclamation-triangle"></i>
        </div>

        <h1 class="font-serif text-3xl font-bold mb-4">Delete "{{ post.title }}"?</h1>
        <p class="text-text-muted mb-8">
            Are you sure you want to delete this lore? This action cannot be undone and the story will be lost.
        </p>

        <form method="post" class="flex justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'lore:detail' post.slug %}" class="btn-ghost">Cancel</a>
            <button type="submit"
                class="btn-primary bg-red-600 hover:bg-red-700 hover:-translate-y-1 shadow-[4px_4px_0px_0px_rgba(220,38,38,0.2)]">
                <i class="fas fa-trash mr-2"></i> Yes, Delete Lore
            </button>
        </form>
    </div>
</div>
{% endblock %}
